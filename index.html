<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Writing Assistant</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>

<div class="background">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
</div>

<div class="container">

<header>

<div class="logo">

<div class="logoBox">
✨
</div>

<div>

<h1>AI Writing Assistant</h1>

<p>Grammar • Rewrite • AI Powered</p>

</div>

</div>

</header>


<div class="toolbar">

<button id="correctBtn">✨ Correct</button>

<button id="professionalBtn">💼 Professional</button>

<button id="casualBtn">😊 Casual</button>

<button id="clearBtn">🗑 Clear</button>

</div>



<div class="workspace">

<!-- LEFT -->

<div class="card">

<div class="cardHeader">

<h2>Your Text</h2>

<div class="counter">

<span id="wordCount">0 Words</span>

<span>|</span>

<span id="charCount">0 Characters</span>

</div>

</div>


<textarea

id="inputText"

placeholder="Start typing here..."></textarea>



<div class="bottomBar">

<button id="voiceBtn">

🎤 Voice

</button>

</div>

</div>



<!-- RIGHT -->

<div class="card">

<div class="cardHeader">

<h2>AI Response</h2>

<div class="status">

<div class="dot"></div>

Ready

</div>

</div>



<div id="output">

Your corrected text will appear here...

</div>



<div class="bottomBar">

<button id="copyBtn">

📋 Copy

</button>

<button id="downloadBtn">

📄 Download

</button>

</div>

</div>

</div>



<div class="enhanceArea">

<button id="enhanceBtn">

✨ Enhance My Writing

</button>

</div>


<footer>

Made by Rishika Ranjan

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
